<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="style.css">
  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>
  <main class="post-container">
    <article class="post-card">
      <img src="./assets/images/illustration-article.svg" alt="Illustration article image">
      <div class="header">
        <h2 class="post-categories">Learning</h2>
        <p class="post-date">
          Published <time datetime="2023-12-21">21 Dec 2023</time>
        </p>
        <h1 class="post-title">
          <a  href="#">
            HTML & CSS foundations 
          </a>        
        </h1>       
      </div>
      <div class="post-content">
        <p>
          These languages are the backbone of every website, defining structure, content, and presentation.
        </p>
      </div>
      <footer class="post-footer">
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper profile picture">
        <h3 class="post-author">Greg Hooper</h3>
      </footer>
  </article>
  </main> 
  <footer>
    <p class="attribution">
      Challenge by <a class="attribution-challenge" href="https://www.frontendmentor.io?ref=challenge" title="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a class="attribution-me" href="https://github.com/zsanifekete/qr-code-component-challenge" title="https://github.com/zsanifekete/qr-code-component-challenge" target="_blank">ZsaniFekete</a>. 
    </p>
  </footer>
</body>
</html>
